<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loan Manager">
    <meta name="theme-color" content="#667eea">
    <title>💰 My Lendings management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="https://unpkg.com/idb?module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* ... original CSS and HTML content omitted for brevity ... */

    </style>
</head>
<body>

<!-- original page content continues here -->

<!-- Export / Import controls (no repo backup) -->
<style>
  #backup-floating {
    position: fixed;
    right: 12px;
    bottom: 12px;
    z-index: 9999;
    display: flex;
    gap: 6px;
    flex-direction: column;
    align-items: stretch;
  }
  #backup-floating button {
    background: #667eea;
    color: white;
    border: none;
    padding: 10px 12px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  #backup-floating button.pdf {
    background: #28a745;
  }
  #backup-msg {
    position: fixed;
    right: 12px;
    bottom: 120px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.95em;
    display: none;
    z-index: 10000;
  }
</style>

<div id="backup-floating" aria-hidden="true">
  <button id="export-pdf" class="pdf">Export PDF</button>
  <button id="export-csv">Export CSV</button>
  <button id="export-json">Export JSON</button>
  <button id="import-json">Import JSON</button>
  <input id="import-file" type="file" accept="application/json" style="display:none" />
</div>
<div id="backup-msg" role="status"></div>

<script>
(async function(){
  // IndexedDB-based storage for loans (migrations from localStorage)
  const DB_NAME = 'myloan-db';
  const DB_VERSION = 1;
  const STORE_NAME = 'loans';

  // Helpers
  function normalizeLoan(l) {
    const borrowerName = l.borrowerName ?? l.name ?? l.borrower ?? '';
    const amountRaw = l.amount ?? l.loanAmount ?? l.principal ?? '';
    const interestRaw = l.interestRate ?? l.interest ?? l.rate ?? '';
    const loanDateRaw = l.loanDate ?? l.date ?? l.startDate ?? '';
    const phoneNumber = l.phoneNumber ?? l.phone ?? l.contact ?? '';

    const amount = (typeof amountRaw === 'number') ? amountRaw : (Number(String(amountRaw).replace(/[^0-9.-]+/g, '')) || 0);
    const interestRate = (typeof interestRaw === 'number') ? interestRaw : (Number(String(interestRaw).replace(/[^0-9.-]+/g, '')) || 0);
    const loanDate = loanDateRaw ? new Date(loanDateRaw).toISOString() : new Date().toISOString();

    return { borrowerName, amount, interestRate, loanDate, phoneNumber };
  }

  // idb is available as module from unpkg; use window.indexedDB fallback if idb not loaded
  const idb = window.idb;

  async function openDB() {
    if (idb && idb.openDB) {
      return idb.openDB(DB_NAME, DB_VERSION, {
        upgrade(db) {
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            store.createIndex('loanDate', 'loanDate');
            store.createIndex('borrowerName', 'borrowerName');
          }
        }
      });
    }
    // Minimal fallback using native IndexedDB
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          store.createIndex('loanDate', 'loanDate');
          store.createIndex('borrowerName', 'borrowerName');
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function addLoan(db, loan) {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    await store.add(loan);
    await tx.done;
  }

  async function putLoan(db, loan) {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    await store.put(loan);
    await tx.done;
  }

  async function getAllLoans(db) {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    if (idb && idb.getAll) {
      return await store.getAll();
    }
    // fallback
    return new Promise((resolve, reject) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function makeId() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now() + '-' + Math.floor(Math.random()*100000);
  }

  // localStorage heuristics (same as previous)
  const PREFERRED_KEY = 'loans';
  const KNOWN_KEYS = ['loans','myLoans','loanData','loan_list','loanDataList','loanDetails'];

  function findLoansInLocalStorage() {
    for (const k of KNOWN_KEYS) {
      try {
        const raw = localStorage.getItem(k);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return { key: k, value: parsed };
      } catch(e){}
    }
    if (window.loans && Array.isArray(window.loans)) return { key: PREFERRED_KEY, value: window.loans };
    for (let i = 0; i < localStorage.length; i++) {
      try {
        const key = localStorage.key(i);
        const parsed = JSON.parse(localStorage.getItem(key));
        if (Array.isArray(parsed) && parsed.length > 0 && typeof parsed[0] === 'object') {
          const sample = parsed[0];
          const hasLoanLike = ['name','borrower','amount','loanAmount','interest','interestRate','date','phone','phoneNumber']
            .some(f => f in sample);
          if (hasLoanLike) return { key, value: parsed };
        }
      } catch(e){}
    }
    return { key: PREFERRED_KEY, value: [] };
  }

  async function migrateToIndexedDB(db) {
    try {
      const migratedFlag = localStorage.getItem('loans_migrated_v1');
      if (migratedFlag) return; // already migrated
      const found = findLoansInLocalStorage();
      if (!found || !found.value || found.value.length === 0) {
        localStorage.setItem('loans_migrated_v1', '1');
        return;
      }
      const existing = await getAllLoans(db);
      if (existing && existing.length > 0) {
        // DB already has data; do not duplicate, but mark migrated
        localStorage.setItem('loans_migrated_v1', '1');
        return;
      }
      for (let i = 0; i < found.value.length; i++) {
        const raw = found.value[i];
        const norm = normalizeLoan(raw);
        const loan = {
          id: makeId(),
          borrowerName: norm.borrowerName,
          amount: norm.amount,
          interestRate: norm.interestRate,
          loanDate: norm.loanDate,
          phoneNumber: norm.phoneNumber,
          status: raw.status ?? 'active',
          createdAt: raw.createdAt ?? new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        await putLoan(db, loan);
      }
      localStorage.setItem('loans_migrated_v1', '1');
      console.log('Migrated loans to IndexedDB');
    } catch (e) {
      console.error('Migration failed', e);
    }
  }

  // UI helpers
  function showMsg(text, t = 3000) {
    const el = document.getElementById('backup-msg');
    if (!el) return;
    el.textContent = text;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(()=> { el.style.display = 'none'; el.textContent = ''; }, t);
  }

  function download(content, filename, mime) {
    const blob = new Blob([content], { type: mime || 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 1500);
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // Export implementations reading from IndexedDB
  async function exportJSON(db) {
    const loans = await getAllLoans(db);
    if (!loans || loans.length === 0) { alert('No loans to export'); return; }
    download(JSON.stringify(loans, null, 2), 'loans-backup.json', 'application/json');
    showMsg('JSON exported');
  }

  async function exportCSV(db) {
    const loans = await getAllLoans(db);
    if (!loans || loans.length === 0) { alert('No loans to export'); return; }
    const columns = ['BorrowerName','LoanAmount','InterestRate','LoanDate','PhoneNumber'];
    const rows = loans.map(ln => {
      return columns.map(col => {
        const key = col === 'BorrowerName' ? 'borrowerName' :
                    col === 'LoanAmount' ? 'amount' :
                    col === 'LoanDate' ? 'loanDate' :
                    col === 'InterestRate' ? 'interestRate' :
                    'phoneNumber';
        const val = (ln[key] ?? '').toString().replace(/"/g,'""');
        return `"${val}"`;
      }).join(',');
    });
    const csv = [columns.join(','), ...rows].join('\n');
    download(csv, 'loans.csv', 'text/csv;charset=utf-8;');
    showMsg('CSV exported');
  }

  async function exportPDF(db) {
    const loans = await getAllLoans(db);
    if (!loans || loans.length === 0) { alert('No loans to export'); return; }
    const tableStyles = `
      <style>
        body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; padding:16px;}
        table{width:100%; border-collapse:collapse; margin-top:8px;}
        th,td{border:1px solid #ddd; padding:8px; text-align:left; font-size:12px;}
        th{background:#f0f0f0; font-weight:700;}
        caption{font-size:18px; font-weight:700; margin-bottom:8px; text-align:left;}
      </style>
    `;
    const header = ['Borrower Name','Loan Amount','Interest Rate','Loan Date','Phone'];
    const rows = loans.map(ln => {
      return `<tr>
        <td>${escapeHtml(ln.borrowerName)}</td>
        <td>${escapeHtml(ln.amount)}</td>
        <td>${escapeHtml(ln.interestRate)}</td>
        <td>${escapeHtml(ln.loanDate)}</td>
        <td>${escapeHtml(ln.phoneNumber)}</td>
      </tr>`;
    }).join('');
    const html = `<div id="loans-export"><caption>All Loans</caption><table>
      <thead><tr>${header.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
    const container = document.createElement('div');
    container.innerHTML = tableStyles + html;
    document.body.appendChild(container);
    try {
      const opt = {
        margin: 10,
        filename: 'loans.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      await html2pdf().set(opt).from(container).save();
      showMsg('PDF exported');
    } catch (err) {
      console.error(err);
      alert('PDF export failed: ' + (err && err.message ? err.message : err));
    } finally {
      container.remove();
    }
  }

  // Import JSON into IndexedDB
  const importFileInput = document.getElementById('import-file');
  importFileInput?.addEventListener('change', async (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed)) throw new Error('Backup must be a JSON array');
        const db = await openDB();
        // clear existing and insert
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        // remove all existing
        if (store.clear) store.clear();
        for (let i = 0; i < parsed.length; i++) {
          const raw = parsed[i];
          const norm = normalizeLoan(raw);
          const loan = {
            id: makeId(),
            borrowerName: norm.borrowerName,
            amount: norm.amount,
            interestRate: norm.interestRate,
            loanDate: norm.loanDate,
            phoneNumber: norm.phoneNumber,
            status: raw.status ?? 'active',
            createdAt: raw.createdAt ?? new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };
          store.put(loan);
        }
        await tx.done;
        showMsg('Backup imported & saved');
        if (typeof renderLoans === 'function') renderLoans();
      } catch (err) {
        alert('Import failed: ' + (err.message || err));
      } finally {
        ev.target.value = '';
      }
    };
    reader.readAsText(file);
  });

  // Wire buttons after DB open and migration
  const db = await openDB();
  await migrateToIndexedDB(db);

  document.getElementById('export-json')?.addEventListener('click', () => exportJSON(db));
  document.getElementById('export-csv')?.addEventListener('click', () => exportCSV(db));
  document.getElementById('export-pdf')?.addEventListener('click', () => exportPDF(db));
  document.getElementById('import-json')?.addEventListener('click', () => importFileInput?.click());

  // Expose helper for app to save loans back to DB
  window.updateLoansAndSave = async function(newLoans) {
    try {
      const db = await openDB();
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      // naive approach: clear and bulk put
      if (store.clear) store.clear();
      for (let i = 0; i < newLoans.length; i++) {
        const raw = newLoans[i];
        const norm = normalizeLoan(raw);
        const loan = {
          id: raw.id ?? makeId(),
          borrowerName: norm.borrowerName,
          amount: norm.amount,
          interestRate: norm.interestRate,
          loanDate: norm.loanDate,
          phoneNumber: norm.phoneNumber,
          status: raw.status ?? 'active',
          createdAt: raw.createdAt ?? new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
        store.put(loan);
      }
      await tx.done;
      showMsg('Saved');
    } catch (e) {
      console.error('updateLoansAndSave failed', e);
      showMsg('Save failed');
    }
  };

})();
</script>

</body>
</html>
