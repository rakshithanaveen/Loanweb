<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loan Manager">
    <meta name="theme-color" content="#667eea">
    <title>💰 My Lendings management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* ... original CSS and HTML content omitted for brevity ... */

    </style>
</head>
<body>

<!-- original page content continues here -->

<!-- Backup / Export controls injected by Copilot -->
<style>
  #backup-floating {
    position: fixed;
    right: 12px;
    bottom: 12px;
    z-index: 9999;
    display: flex;
    gap: 6px;
    flex-direction: column;
    align-items: stretch;
  }
  #backup-floating button {
    background: #667eea;
    color: white;
    border: none;
    padding: 10px 12px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  #backup-floating button.pdf {
    background: #28a745;
  }
  #backup-msg {
    position: fixed;
    right: 12px;
    bottom: 120px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.95em;
    display: none;
    z-index: 10000;
  }
  /* simple modal */
  #backup-modal {
    position: fixed;
    left: 0; top: 0; right:0; bottom:0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); z-index: 11000;
  }
  #backup-modal.active { display:flex; }
  #backup-modal .modal-box { background:white; padding:16px; border-radius:8px; width:90%; max-width:480px; }
  #pat-input { width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; }
</style>

<div id="backup-floating" aria-hidden="true">
  <button id="export-pdf" class="pdf">Export PDF</button>
  <button id="export-csv">Export CSV</button>
  <button id="export-json">Export JSON</button>
  <button id="import-json">Import JSON</button>
  <button id="backup-config">Backup Settings</button>
  <input id="import-file" type="file" accept="application/json" style="display:none" />
</div>
<div id="backup-msg" role="status"></div>

<div id="backup-modal" aria-hidden="true">
  <div class="modal-box">
    <h3>Backup Settings</h3>
    <p style="font-size:0.9em;color:#444;margin-bottom:8px;">Paste a short-lived GitHub Personal Access Token (repo scope) to enable automatic repo backups. The token will be stored only in your browser's localStorage. Revoke it when finished.</p>
    <input id="pat-input" placeholder="ghp_your_token_here" autocomplete="off" />
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
      <button id="pat-save" style="background:#28a745;color:#fff;padding:8px 12px;border-radius:6px;border:none;">Save</button>
      <button id="pat-clear" style="background:#dc3545;color:#fff;padding:8px 12px;border-radius:6px;border:none;">Clear</button>
    </div>
  </div>
</div>

<script>
(function(){
  const OWNER = 'rakshithanaveen';
  const REPO = 'My-loan';
  const TARGET_BRANCH = 'main';
  const BACKUP_DIR = 'backups';

  const PREFERRED_KEY = 'loans';
  const KNOWN_KEYS = ['loans','myLoans','loanData','loan_list','loanDataList','loanDetails'];

  function findLoansKeyAndValue() {
    for (const k of KNOWN_KEYS) {
      try {
        const raw = localStorage.getItem(k);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return { key: k, value: parsed };
      } catch(e){}
    }
    if (window.loans && Array.isArray(window.loans)) return { key: PREFERRED_KEY, value: window.loans };
    for (let i = 0; i < localStorage.length; i++) {
      try {
        const key = localStorage.key(i);
        const parsed = JSON.parse(localStorage.getItem(key));
        if (Array.isArray(parsed) && parsed.length > 0 && typeof parsed[0] === 'object') {
          const sample = parsed[0];
          const hasLoanLike = ['name','borrower','amount','loanAmount','interest','interestRate','date','phone','phoneNumber']
            .some(f => f in sample);
          if (hasLoanLike) return { key, value: parsed };
        }
      } catch(e){}
    }
    return { key: PREFERRED_KEY, value: [] };
  }

  function readLoans() {
    const discovered = findLoansKeyAndValue();
    return { key: discovered.key, loans: discovered.value || [] };
  }

  function saveLoans(key, loans) {
    try {
      localStorage.setItem(key, JSON.stringify(loans));
      window.loans = loans;
      return true;
    } catch(e) {
      console.error('saveLoans error', e);
      return false;
    }
  }

  function normalizeLoan(l) {
    return {
      borrowerName: l.borrowerName ?? l.name ?? l.borrower ?? '',
      amount: l.amount ?? l.loanAmount ?? l.principal ?? '',
      interestRate: l.interestRate ?? l.interest ?? l.rate ?? '',
      loanDate: l.loanDate ?? l.date ?? l.startDate ?? '',
      phoneNumber: l.phoneNumber ?? l.phone ?? l.contact ?? ''
    };
  }

  function loansToCSV(loans) {
    if (!loans || loans.length === 0) return '';
    const columns = ['BorrowerName','LoanAmount','InterestRate','LoanDate','PhoneNumber'];
    const rows = loans.map(ln => {
      const n = normalizeLoan(ln);
      return columns.map(col => {
        const key = col === 'BorrowerName' ? 'borrowerName' :
                    col === 'LoanAmount' ? 'amount' :
                    col === 'InterestRate' ? 'interestRate' :
                    col === 'LoanDate' ? 'loanDate' :
                    'phoneNumber';
        const val = (n[key] ?? '').toString().replace(/"/g,'""');
        return `"${val}"`;
      }).join(',');
    });
    return [columns.join(','), ...rows].join('\n');
  }

  function download(content, filename, mime) {
    const blob = new Blob([content], { type: mime || 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 1500);
  }

  function showMsg(text, t = 3000) {
    const el = document.getElementById('backup-msg');
    if (!el) return;
    el.textContent = text;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(()=> { el.style.display = 'none'; el.textContent = ''; }, t);
  }

  // GitHub upload helpers
  function getStoredPAT() {
    try { return localStorage.getItem('GITHUB_BACKUP_PAT') || '';} catch(e){return '';}
  }
  function setStoredPAT(v) { try { localStorage.setItem('GITHUB_BACKUP_PAT', v); } catch(e){} }
  function clearStoredPAT(){ try { localStorage.removeItem('GITHUB_BACKUP_PAT'); } catch(e){} }

  async function uploadBackupToGitHub(jsonObj) {
    const pat = getStoredPAT();
    if (!pat) { showMsg('No PAT (Backup Settings) — backup skipped'); return false; }
    const timestamp = (new Date()).toISOString().replace(/[:.]/g,'-');
    const filename = `${BACKUP_DIR}/${timestamp}-backup.json`;
    const path = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(filename)}`;
    const contentStr = JSON.stringify(jsonObj, null, 2);
    const contentB64 = btoa(unescape(encodeURIComponent(contentStr)));

    // Check if file exists to get sha
    let existingSha = null;
    try {
      const getResp = await fetch(path + `?ref=${TARGET_BRANCH}`, { headers: { 'Authorization': 'token ' + pat, 'Accept':'application/vnd.github.v3+json' } });
      if (getResp.status === 200) {
        const data = await getResp.json();
        existingSha = data.sha;
      }
    } catch (e) {
      // ignore
    }

    const body = {
      message: `backup: ${timestamp}`,
      content: contentB64,
      branch: TARGET_BRANCH
    };
    if (existingSha) body.sha = existingSha;

    try {
      const resp = await fetch(path, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + pat,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const txt = await resp.text();
        console.error('Upload failed', resp.status, txt);
        showMsg('Repo upload failed');
        return false;
      }
      showMsg('Backup saved to repo');
      return true;
    } catch (err) {
      console.error(err);
      showMsg('Upload error');
      return false;
    }
  }

  // UI: config modal
  const modal = document.getElementById('backup-modal');
  const btnConfig = document.getElementById('backup-config');
  const patInput = document.getElementById('pat-input');
  document.getElementById('pat-save')?.addEventListener('click', () => {
    const v = patInput.value.trim();
    if (!v) { alert('Enter token'); return; }
    setStoredPAT(v);
    modal.classList.remove('active');
    showMsg('Token saved (in browser)');
    patInput.value = '';
  });
  document.getElementById('pat-clear')?.addEventListener('click', () => {
    clearStoredPAT(); patInput.value = ''; modal.classList.remove('active'); showMsg('Token cleared');
  });
  btnConfig?.addEventListener('click', () => { modal.classList.add('active'); });
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  // Export handlers
  document.getElementById('export-json')?.addEventListener('click', async () => {
    const { loans } = readLoans();
    if (!loans || loans.length === 0) { alert('No loans to export'); return; }
    const normalized = loans.map(normalizeLoan);
    download(JSON.stringify(normalized, null, 2), 'loans-backup.json', 'application/json');
    showMsg('JSON exported locally');
    // try repo upload in background
    uploadBackupToGitHub({ createdAt: new Date().toISOString(), loans: normalized });
  });

  document.getElementById('export-csv')?.addEventListener('click', async () => {
    const { loans } = readLoans();
    const csv = loansToCSV(loans);
    if (!csv) { alert('No loans to export'); return; }
    download(csv, 'loans.csv', 'text/csv;charset=utf-8;');
    showMsg('CSV exported locally');
    const normalized = loans.map(normalizeLoan);
    uploadBackupToGitHub({ createdAt: new Date().toISOString(), loans: normalized });
  });

  document.getElementById('export-pdf')?.addEventListener('click', async () => {
    const { loans } = readLoans();
    if (!loans || loans.length === 0) { alert('No loans to export'); return; }

    const tableStyles = `
      <style>
        body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial; padding:16px;}
        table{width:100%; border-collapse:collapse; margin-top:8px;}
        th,td{border:1px solid #ddd; padding:8px; text-align:left; font-size:12px;}
        th{background:#f0f0f0; font-weight:700;}
        caption{font-size:18px; font-weight:700; margin-bottom:8px; text-align:left;}
      </style>
    `;

    const header = ['Borrower Name','Loan Amount','Interest Rate','Loan Date','Phone'];
    const rows = loans.map(ln => {
      const n = normalizeLoan(ln);
      return `<tr>
        <td>${escapeHtml(n.borrowerName)}</td>
        <td>${escapeHtml(n.amount)}</td>
        <td>${escapeHtml(n.interestRate)}</td>
        <td>${escapeHtml(n.loanDate)}</td>
        <td>${escapeHtml(n.phoneNumber)}</td>
      </tr>`;
    }).join('');

    const html = `<div id="loans-export"><caption>All Loans</caption><table>
      <thead><tr>${header.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

    const container = document.createElement('div');
    container.innerHTML = tableStyles + html;
    document.body.appendChild(container);

    try {
      const opt = {
        margin: 10,
        filename: 'loans.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      await html2pdf().set(opt).from(container).save();
      showMsg('PDF exported locally');
      const normalized = loans.map(normalizeLoan);
      uploadBackupToGitHub({ createdAt: new Date().toISOString(), loans: normalized });
    } catch (err) {
      console.error(err);
      alert('PDF export failed: ' + (err && err.message ? err.message : err));
    } finally {
      container.remove();
    }
  });

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // Import JSON
  const importFileInput = document.getElementById('import-file');
  document.getElementById('import-json')?.addEventListener('click', () => importFileInput?.click());
  importFileInput?.addEventListener('change', (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed)) throw new Error('Backup must be a JSON array');
        const { key: detectedKey } = readLoans();
        if (!saveLoans(detectedKey || PREFERRED_KEY, parsed)) throw new Error('Save failed');
        showMsg('Backup imported & saved');
        if (typeof renderLoans === 'function') renderLoans();
      } catch(err) {
        alert('Import failed: ' + (err.message || err));
      } finally {
        ev.target.value = '';
      }
    };
    reader.readAsText(file);
  });

  window.updateLoansAndSave = function(newLoans) {
    const { key } = readLoans();
    saveLoans(key || PREFERRED_KEY, newLoans);
    showMsg('Saved');
  };

})();
</script>

</body>
</html>
