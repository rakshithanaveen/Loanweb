name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup App Workspace Directories
        run: |
          npm init -y
          mkdir -p www
          cp index.html www/

      - name: Install Open Source Mobile Tooling
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Initialize App Framework Layout
        run: |
          npx cap init "Loan Manager" "com.naveen.loanmanager" --web-dir=www --confirm

      - name: Add Android Platform Shell
        run: npx cap add android

      - name: Sync App Views to Native Container
        run: npx cap sync android

      - name: Compile Standalone Installer (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Deliver Mobile App Download Package
        uses: actions/upload-artifact@v4
        with:
          name: LoanManager-App-Installer
          path: android/app/build/outputs/apk/debug/app-debug.apk
